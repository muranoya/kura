name: Release

on:
  workflow_dispatch:
    inputs:
      components:
        description: "Release target"
        required: true
        default: "all"
        type: choice
        options:
          - all
          - desktop
          - extension
          - android
      dry_run:
        description: "Dry run (build only, skip release creation)"
        required: false
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  prepare:
    name: Prepare release
    runs-on: ubuntu-latest
    outputs:
      build_desktop: ${{ steps.targets.outputs.build_desktop }}
      build_extension: ${{ steps.targets.outputs.build_extension }}
      build_android: ${{ steps.targets.outputs.build_android }}
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Determine build targets
        id: targets
        env:
          INPUT_COMPONENTS: ${{ inputs.components }}
        run: |
          if [ "$INPUT_COMPONENTS" = "all" ] || [ "$INPUT_COMPONENTS" = "desktop" ]; then
            echo "build_desktop=true" >> "$GITHUB_OUTPUT"
          else
            echo "build_desktop=false" >> "$GITHUB_OUTPUT"
          fi
          if [ "$INPUT_COMPONENTS" = "all" ] || [ "$INPUT_COMPONENTS" = "extension" ]; then
            echo "build_extension=true" >> "$GITHUB_OUTPUT"
          else
            echo "build_extension=false" >> "$GITHUB_OUTPUT"
          fi
          if [ "$INPUT_COMPONENTS" = "all" ] || [ "$INPUT_COMPONENTS" = "android" ]; then
            echo "build_android=true" >> "$GITHUB_OUTPUT"
          else
            echo "build_android=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Read VERSION and validate
        id: version
        env:
          INPUT_COMPONENTS: ${{ inputs.components }}
        run: |
          version=$(cat VERSION)
          tag="v${version}"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"

          if git rev-parse "refs/tags/$tag" >/dev/null 2>&1; then
            tag_exists=true
          else
            tag_exists=false
          fi

          if [ "$tag_exists" = "true" ] && [ "$INPUT_COMPONENTS" = "all" ]; then
            echo "::error::Tag $tag already exists. Bump VERSION before releasing all components."
            exit 1
          fi

          if [ "$tag_exists" = "false" ] && [ "$INPUT_COMPONENTS" != "all" ]; then
            echo "::error::Tag $tag does not exist. New versions must be released with components=all."
            exit 1
          fi

  # ---------------------------------------------------------------------------
  # Desktop builds (Linux / macOS / Windows)
  # ---------------------------------------------------------------------------
  release-desktop-linux:
    name: Desktop (Linux)
    needs: prepare
    if: needs.prepare.outputs.build_desktop == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            imagemagick

      - uses: pnpm/action-setup@v6
        with:
          version: 10
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: desktop/pnpm-lock.yaml

      - uses: extractions/setup-just@v4

      - name: Build
        run: just release-desktop-linux

      - name: Rename artifacts
        env:
          VERSION: ${{ needs.prepare.outputs.version }}
        run: |
          appimage=$(find target/release/bundle/appimage -name '*.AppImage' | head -1)
          deb=$(find target/release/bundle/deb -name '*.deb' | head -1)
          mv "$appimage" "target/release/bundle/appimage/kura-desktop-linux-${VERSION}.AppImage"
          mv "$deb" "target/release/bundle/deb/kura-desktop-linux-${VERSION}.deb"

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: desktop-linux
          path: |
            target/release/bundle/appimage/*.AppImage
            target/release/bundle/deb/*.deb

  release-desktop-macos:
    name: Desktop (macOS)
    needs: prepare
    if: needs.prepare.outputs.build_desktop == 'true'
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Install ImageMagick
        run: brew install imagemagick

      - uses: pnpm/action-setup@v6
        with:
          version: 10
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: desktop/pnpm-lock.yaml

      - uses: extractions/setup-just@v4

      - name: Build
        run: just release-desktop-macos

      - name: Rename artifacts
        env:
          VERSION: ${{ needs.prepare.outputs.version }}
        run: |
          dmg=$(find target/release/bundle/dmg -name '*.dmg' | head -1)
          mv "$dmg" "target/release/bundle/dmg/kura-desktop-macos-${VERSION}.dmg"

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: desktop-macos
          path: target/release/bundle/dmg/*.dmg

  release-desktop-windows:
    name: Desktop (Windows)
    needs: prepare
    if: needs.prepare.outputs.build_desktop == 'true'
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Install ImageMagick
        run: choco install imagemagick -y

      - uses: pnpm/action-setup@v6
        with:
          version: 10
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: desktop/pnpm-lock.yaml

      - uses: extractions/setup-just@v4

      - name: Build
        shell: bash
        run: just release-desktop-windows

      - name: Rename artifacts
        shell: bash
        env:
          VERSION: ${{ needs.prepare.outputs.version }}
        run: |
          exe=$(find target/release/bundle/nsis -name '*.exe' | head -1)
          mv "$exe" "target/release/bundle/nsis/kura-desktop-windows-${VERSION}.exe"
          nsis_zip=$(find target/release/bundle/nsis -name '*.nsis.zip' | head -1)
          if [ -n "$nsis_zip" ]; then
            mv "$nsis_zip" "target/release/bundle/nsis/kura-desktop-windows-${VERSION}.nsis.zip"
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: desktop-windows
          path: |
            target/release/bundle/nsis/*.exe
            target/release/bundle/nsis/*.nsis.zip

  # ---------------------------------------------------------------------------
  # Browser extension (Chrome + Firefox)
  # ---------------------------------------------------------------------------
  release-extension:
    name: Extension
    needs: prepare
    if: needs.prepare.outputs.build_extension == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: extension/wasm-bridge

      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

      - name: Install ImageMagick
        run: sudo apt-get update && sudo apt-get install -y imagemagick

      - uses: pnpm/action-setup@v6
        with:
          version: 10
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: extension/pnpm-lock.yaml

      - uses: extractions/setup-just@v4

      - name: Build
        run: just release-extension

      - name: Sign Firefox extension (AMO)
        continue-on-error: true
        env:
          AMO_API_KEY: ${{ secrets.AMO_API_KEY }}
          AMO_API_SECRET: ${{ secrets.AMO_API_SECRET }}
        run: |
          if [ -z "$AMO_API_KEY" ] || [ -z "$AMO_API_SECRET" ]; then
            echo "::warning::AMO credentials not configured. Skipping Firefox signing."
            exit 0
          fi
          cd extension && pnpm web-ext sign \
            --source-dir dist \
            --channel unlisted \
            --api-key "$AMO_API_KEY" \
            --api-secret "$AMO_API_SECRET" \
            --artifacts-dir .

      - name: Rename extension artifacts
        env:
          VERSION: ${{ needs.prepare.outputs.version }}
        run: |
          mv extension/kura-extension-chrome.zip "extension/kura-chrome-extension-${VERSION}.zip"
          mv extension/kura-extension-firefox.zip "extension/kura-firefox-extension-${VERSION}.zip"
          xpi_file=$(find extension -maxdepth 1 -name '*.xpi' | head -1)
          if [ -n "$xpi_file" ]; then
            mv "$xpi_file" "extension/kura-firefox-extension-${VERSION}.xpi"
          else
            echo "No signed xpi found (signing likely skipped). Nothing to rename."
          fi

      - name: Upload Chrome zip
        uses: actions/upload-artifact@v7
        with:
          name: extension-chrome
          path: extension/kura-chrome-extension-${{ needs.prepare.outputs.version }}.zip

      - name: Upload Firefox zip
        uses: actions/upload-artifact@v7
        with:
          name: extension-firefox
          path: extension/kura-firefox-extension-${{ needs.prepare.outputs.version }}.zip

      - name: Upload Firefox signed xpi
        uses: actions/upload-artifact@v7
        with:
          name: extension-firefox-signed
          path: extension/kura-firefox-extension-${{ needs.prepare.outputs.version }}.xpi
          if-no-files-found: ignore

  # ---------------------------------------------------------------------------
  # Android APK
  # ---------------------------------------------------------------------------
  release-android:
    name: Android
    needs: prepare
    if: needs.prepare.outputs.build_android == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,x86_64-linux-android,i686-linux-android

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: android/rust-jni

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21

      - uses: gradle/actions/setup-gradle@v6

      - name: Setup Android SDK
        uses: android-actions/setup-android@v4

      - name: Install NDK
        run: sdkmanager --install "ndk;27.0.12077973"

      - name: Install cargo-ndk
        run: cargo install cargo-ndk

      - name: Install ImageMagick
        run: sudo apt-get update && sudo apt-get install -y imagemagick

      - uses: extractions/setup-just@v4

      - name: Check keystore availability
        id: check_keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          if [ -n "$KEYSTORE_BASE64" ]; then
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Decode release keystore
        if: steps.check_keystore.outputs.available == 'true'
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          printf '%s' "$KEYSTORE_BASE64" | tr -d '\r' | base64 -d > "$RUNNER_TEMP/release.keystore"

      - name: Build
        env:
          ANDROID_NDK_HOME: ${{ env.ANDROID_HOME }}/ndk/27.0.12077973
          KURA_KEYSTORE_FILE: ${{ steps.check_keystore.outputs.available == 'true' && format('{0}/release.keystore', runner.temp) || '' }}
          KURA_KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KURA_KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KURA_KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: just release-android

      - name: Rename APK
        env:
          VERSION: ${{ needs.prepare.outputs.version }}
        run: |
          apk_dir="android/app/build/outputs/apk/release"
          apk_file=$(find "$apk_dir" -name '*.apk' -not -name '*-unsigned*' | head -1)
          if [ -z "$apk_file" ]; then
            apk_file=$(find "$apk_dir" -name '*.apk' | head -1)
          fi
          cp "$apk_file" "$apk_dir/kura-android-${VERSION}.apk"
          find "$apk_dir" -name '*.apk' ! -name "kura-android-${VERSION}.apk" -delete

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: android-apk
          path: android/app/build/outputs/apk/release/*.apk

  # ---------------------------------------------------------------------------
  # Create GitHub Release
  # ---------------------------------------------------------------------------
  create-release:
    name: Create GitHub Release
    needs:
      - prepare
      - release-desktop-linux
      - release-desktop-macos
      - release-desktop-windows
      - release-extension
      - release-android
    if: >-
      always()
      && inputs.dry_run == false
      && !contains(needs.*.result, 'failure')
      && contains(needs.*.result, 'success')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: Create or update release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.prepare.outputs.tag }}
          VERSION: ${{ needs.prepare.outputs.version }}
          BUILD_DESKTOP: ${{ needs.prepare.outputs.build_desktop }}
          BUILD_EXTENSION: ${{ needs.prepare.outputs.build_extension }}
          BUILD_ANDROID: ${{ needs.prepare.outputs.build_android }}
        run: |
          artifact_dirs=()
          if [ "$BUILD_DESKTOP" = "true" ]; then
            artifact_dirs+=(artifacts/desktop-linux artifacts/desktop-macos artifacts/desktop-windows)
          fi
          if [ "$BUILD_EXTENSION" = "true" ]; then
            artifact_dirs+=(artifacts/extension-chrome artifacts/extension-firefox artifacts/extension-firefox-signed)
          fi
          if [ "$BUILD_ANDROID" = "true" ]; then
            artifact_dirs+=(artifacts/android-apk)
          fi

          files=()
          for dir in "${artifact_dirs[@]}"; do
            if [ -d "$dir" ]; then
              while IFS= read -r f; do
                files+=("$f")
              done < <(find "$dir" -type f)
            fi
          done

          if [ ${#files[@]} -eq 0 ]; then
            echo "::error::No artifacts found to publish."
            exit 1
          fi

          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release $TAG exists. Uploading assets with --clobber."
            gh release upload "$TAG" --clobber "${files[@]}"
          else
            echo "Release $TAG does not exist. Creating new release."
            gh release create "$TAG" \
              --title "v${VERSION}" \
              --generate-notes \
              "${files[@]}"
          fi
