name: Release

on:
  workflow_dispatch:
    inputs:
      components:
        description: "Release target"
        required: true
        default: "all"
        type: choice
        options:
          - all
          - desktop
          - extension
          - android
      dry_run:
        description: "Dry run (build only, skip release creation)"
        required: false
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  prepare:
    name: Prepare release
    runs-on: ubuntu-latest
    outputs:
      build_desktop: ${{ steps.targets.outputs.build_desktop }}
      build_extension: ${{ steps.targets.outputs.build_extension }}
      build_android: ${{ steps.targets.outputs.build_android }}
      desktop_version: ${{ steps.versions.outputs.desktop }}
      extension_version: ${{ steps.versions.outputs.extension }}
      android_version: ${{ steps.versions.outputs.android }}
      desktop_tag: ${{ steps.tags.outputs.desktop }}
      extension_tag: ${{ steps.tags.outputs.extension }}
      android_tag: ${{ steps.tags.outputs.android }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine build targets
        id: targets
        env:
          INPUT_COMPONENTS: ${{ inputs.components }}
        run: |
          if [ "$INPUT_COMPONENTS" = "all" ] || [ "$INPUT_COMPONENTS" = "desktop" ]; then
            echo "build_desktop=true" >> "$GITHUB_OUTPUT"
          else
            echo "build_desktop=false" >> "$GITHUB_OUTPUT"
          fi
          if [ "$INPUT_COMPONENTS" = "all" ] || [ "$INPUT_COMPONENTS" = "extension" ]; then
            echo "build_extension=true" >> "$GITHUB_OUTPUT"
          else
            echo "build_extension=false" >> "$GITHUB_OUTPUT"
          fi
          if [ "$INPUT_COMPONENTS" = "all" ] || [ "$INPUT_COMPONENTS" = "android" ]; then
            echo "build_android=true" >> "$GITHUB_OUTPUT"
          else
            echo "build_android=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Read VERSION files
        id: versions
        run: |
          echo "desktop=$(cat desktop/VERSION)" >> "$GITHUB_OUTPUT"
          echo "extension=$(cat extension/VERSION)" >> "$GITHUB_OUTPUT"
          echo "android=$(cat android/VERSION)" >> "$GITHUB_OUTPUT"

      - name: Compute tags and check duplicates
        id: tags
        env:
          BUILD_DESKTOP: ${{ steps.targets.outputs.build_desktop }}
          BUILD_EXTENSION: ${{ steps.targets.outputs.build_extension }}
          BUILD_ANDROID: ${{ steps.targets.outputs.build_android }}
          DESKTOP_VERSION: ${{ steps.versions.outputs.desktop }}
          EXTENSION_VERSION: ${{ steps.versions.outputs.extension }}
          ANDROID_VERSION: ${{ steps.versions.outputs.android }}
        run: |
          has_error=false

          if [ "$BUILD_DESKTOP" = "true" ]; then
            tag="desktop-v${DESKTOP_VERSION}"
            echo "desktop=$tag" >> "$GITHUB_OUTPUT"
            if git rev-parse "refs/tags/$tag" >/dev/null 2>&1; then
              echo "::error::Tag $tag already exists. Bump desktop/VERSION before releasing."
              has_error=true
            fi
          fi

          if [ "$BUILD_EXTENSION" = "true" ]; then
            tag="extension-v${EXTENSION_VERSION}"
            echo "extension=$tag" >> "$GITHUB_OUTPUT"
            if git rev-parse "refs/tags/$tag" >/dev/null 2>&1; then
              echo "::error::Tag $tag already exists. Bump extension/VERSION before releasing."
              has_error=true
            fi
          fi

          if [ "$BUILD_ANDROID" = "true" ]; then
            tag="android-v${ANDROID_VERSION}"
            echo "android=$tag" >> "$GITHUB_OUTPUT"
            if git rev-parse "refs/tags/$tag" >/dev/null 2>&1; then
              echo "::error::Tag $tag already exists. Bump android/VERSION before releasing."
              has_error=true
            fi
          fi

          if [ "$has_error" = "true" ]; then
            exit 1
          fi

  # ---------------------------------------------------------------------------
  # Desktop builds (Linux / macOS / Windows)
  # ---------------------------------------------------------------------------
  release-desktop-linux:
    name: Desktop (Linux)
    needs: prepare
    if: needs.prepare.outputs.build_desktop == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: desktop/src-tauri

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            imagemagick

      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: desktop/pnpm-lock.yaml

      - uses: extractions/setup-just@v2

      - name: Build
        run: just release-desktop-linux

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: desktop-linux
          path: desktop/src-tauri/target/release/bundle/appimage/*.AppImage

  release-desktop-macos:
    name: Desktop (macOS)
    needs: prepare
    if: needs.prepare.outputs.build_desktop == 'true'
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: desktop/src-tauri

      - name: Install ImageMagick
        run: brew install imagemagick

      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: desktop/pnpm-lock.yaml

      - uses: extractions/setup-just@v2

      - name: Build
        run: just release-desktop-macos

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: desktop-macos
          path: desktop/src-tauri/target/release/bundle/dmg/*.dmg

  release-desktop-windows:
    name: Desktop (Windows)
    needs: prepare
    if: needs.prepare.outputs.build_desktop == 'true'
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: desktop/src-tauri

      - name: Install ImageMagick
        run: choco install imagemagick -y

      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: desktop/pnpm-lock.yaml

      - uses: extractions/setup-just@v2

      - name: Build
        shell: bash
        run: just release-desktop-windows

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: desktop-windows
          path: desktop/src-tauri/target/release/bundle/nsis/*.exe

  # ---------------------------------------------------------------------------
  # Browser extension (Chrome + Firefox)
  # ---------------------------------------------------------------------------
  release-extension:
    name: Extension
    needs: prepare
    if: needs.prepare.outputs.build_extension == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: extension/wasm-bridge

      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

      - name: Install ImageMagick
        run: sudo apt-get update && sudo apt-get install -y imagemagick

      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: extension/pnpm-lock.yaml

      - uses: extractions/setup-just@v2

      - name: Build
        run: just release-extension

      - name: Sign Firefox extension (AMO)
        continue-on-error: true
        env:
          AMO_API_KEY: ${{ secrets.AMO_API_KEY }}
          AMO_API_SECRET: ${{ secrets.AMO_API_SECRET }}
        run: |
          if [ -z "$AMO_API_KEY" ] || [ -z "$AMO_API_SECRET" ]; then
            echo "::warning::AMO credentials not configured. Skipping Firefox signing."
            exit 0
          fi
          cd extension && pnpm web-ext sign \
            --source-dir dist \
            --channel unlisted \
            --api-key "$AMO_API_KEY" \
            --api-secret "$AMO_API_SECRET" \
            --artifacts-dir .

      - name: Upload Chrome zip
        uses: actions/upload-artifact@v4
        with:
          name: extension-chrome
          path: extension/kura-extension-chrome.zip

      - name: Upload Firefox zip
        uses: actions/upload-artifact@v4
        with:
          name: extension-firefox
          path: extension/kura-extension-firefox.zip

      - name: Upload Firefox signed xpi
        uses: actions/upload-artifact@v4
        with:
          name: extension-firefox-signed
          path: extension/*.xpi
          if-no-files-found: ignore

  # ---------------------------------------------------------------------------
  # Android APK
  # ---------------------------------------------------------------------------
  release-android:
    name: Android
    needs: prepare
    if: needs.prepare.outputs.build_android == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,x86_64-linux-android,i686-linux-android

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: android/rust-jni

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - uses: gradle/actions/setup-gradle@v4

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install NDK
        run: sdkmanager --install "ndk;27.0.12077973"

      - name: Install cargo-ndk
        run: cargo install cargo-ndk

      - name: Install ImageMagick
        run: sudo apt-get update && sudo apt-get install -y imagemagick

      - uses: extractions/setup-just@v2

      - name: Build
        env:
          ANDROID_NDK_HOME: ${{ env.ANDROID_HOME }}/ndk/27.0.12077973
        run: just release-android

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: android/app/build/outputs/apk/release/*.apk

  # ---------------------------------------------------------------------------
  # Create GitHub Release
  # ---------------------------------------------------------------------------
  create-release:
    name: Create GitHub Release
    needs:
      - prepare
      - release-desktop-linux
      - release-desktop-macos
      - release-desktop-windows
      - release-extension
      - release-android
    if: >-
      always()
      && inputs.dry_run == false
      && !contains(needs.*.result, 'failure')
      && contains(needs.*.result, 'success')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create desktop release
        if: needs.prepare.outputs.build_desktop == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.prepare.outputs.desktop_tag }}
          VERSION: ${{ needs.prepare.outputs.desktop_version }}
        run: |
          gh release create "$TAG" \
            --title "Desktop v${VERSION}" \
            --generate-notes \
            artifacts/desktop-linux/* \
            artifacts/desktop-macos/* \
            artifacts/desktop-windows/*

      - name: Create extension release
        if: needs.prepare.outputs.build_extension == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.prepare.outputs.extension_tag }}
          VERSION: ${{ needs.prepare.outputs.extension_version }}
        run: |
          files=(artifacts/extension-chrome/* artifacts/extension-firefox/*)
          if [ -d artifacts/extension-firefox-signed ]; then
            files+=(artifacts/extension-firefox-signed/*)
          fi
          gh release create "$TAG" \
            --title "Extension v${VERSION}" \
            --generate-notes \
            "${files[@]}"

      - name: Create android release
        if: needs.prepare.outputs.build_android == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.prepare.outputs.android_tag }}
          VERSION: ${{ needs.prepare.outputs.android_version }}
        run: |
          gh release create "$TAG" \
            --title "Android v${VERSION}" \
            --generate-notes \
            artifacts/android-apk/*
