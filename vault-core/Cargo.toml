[package]
name = "vault_core"
version = "0.1.0"
edition = "2021"

[dependencies]
aes-gcm = "0"
argon2 = "0"
rand = { version = "0", features = ["getrandom"] }
zeroize = { version = "1", features = ["derive"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
uuid = { version = "1", features = ["v4", "serde", "js"] }
thiserror = "2"
chrono = { version = "0", features = ["serde", "wasmbind"] }
base32 = "0"
base64 = "0"
log = "0"
async-trait = "0"
sha2 = "0"
totp-rs = "5"
flutter_rust_bridge = { version = "=2.11.1", optional = true }
once_cell = "1"

aws-sdk-s3 = { version = "1", optional = true }
aws-config = { version = "1", optional = true }
tokio = { version = "1", features = ["rt-multi-thread", "macros"], optional = true }

wasm-bindgen = { version = "0", optional = true }
wasm-bindgen-futures = { version = "0", optional = true }
js-sys = { version = "0", optional = true }
web-sys = { version = "0", features = ["Window", "Headers", "Request", "Response", "RequestInit", "RequestMode"], optional = true }
serde-wasm-bindgen = { version = "0", optional = true }
getrandom = { version = "0", features = ["js"], optional = true }

[features]
default = ["storage-s3"]
storage-s3 = ["dep:aws-sdk-s3", "dep:aws-config", "dep:tokio"]
mobile = ["dep:flutter_rust_bridge", "storage-s3"]
desktop = ["storage-s3"]
wasm = ["dep:wasm-bindgen", "dep:wasm-bindgen-futures", "dep:js-sys", "dep:web-sys", "dep:serde-wasm-bindgen", "dep:getrandom"]

[lib]
crate-type = ["staticlib", "cdylib", "rlib"]

[dev-dependencies]
tokio = { version = "1", features = ["rt", "macros"] }
