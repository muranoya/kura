<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Split Login: Password - Autofill Test</title>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 480px; margin: 40px auto; padding: 0 16px; }
    h1 { font-size: 1.25rem; }
    nav { margin-bottom: 24px; }
    nav a { color: #2563eb; }
    label { display: block; margin-bottom: 4px; font-weight: 500; }
    input { display: block; width: 100%; padding: 8px; margin-bottom: 16px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
    button { padding: 8px 16px; background: #2563eb; color: #fff; border: none; border-radius: 4px; cursor: pointer; }
    .step-indicator { color: #6b7280; margin-bottom: 16px; }
    .username-display { padding: 8px 12px; background: #e5e7eb; border-radius: 4px; margin-bottom: 16px; }
    #result { margin-top: 24px; padding: 12px; background: #f3f4f6; border-radius: 4px; white-space: pre-wrap; display: none; }
    .expected { margin: 24px 0; padding: 12px; background: #fefce8; border: 1px solid #fde68a; border-radius: 4px; font-size: 0.9rem; }
    .expected summary { font-weight: 600; cursor: pointer; }
    .expected ul { margin: 8px 0 0; padding-left: 20px; }
    .expected li { margin-bottom: 4px; }
  </style>
</head>
<body>
  <nav><a href="/">&larr; Test Pages Index</a></nav>
  <h1>Split Login: Password</h1>
  <p class="step-indicator">Step 2 of 2</p>

  <details class="expected" open>
    <summary>Expected Behavior</summary>
    <ul>
      <li>Form type: <code>LOGIN_PASSWORD</code></li>
      <li>Pending flowあり (username pageから5分以内に遷移): password auto-filled <strong>without</strong> dropdown</li>
      <li>Pending flowなし (直接アクセス): dropdown appears normally on focus</li>
    </ul>
  </details>

  <div class="username-display">
    Logging in as: <strong id="username-display"></strong>
  </div>

  <form id="password-form" method="POST" action="#">
    <label for="password">Password</label>
    <input type="password" id="password" name="password" autocomplete="current-password" placeholder="Password" autofocus>

    <button type="submit">Log in</button>
  </form>

  <pre id="result"></pre>

  <script>
    const username = sessionStorage.getItem('split-login-username') || '(none)';
    document.getElementById('username-display').textContent = username;

    document.getElementById('password-form').addEventListener('submit', function(e) {
      e.preventDefault();
      const password = document.getElementById('password').value;
      const result = document.getElementById('result');
      result.style.display = 'block';
      result.textContent = 'Submitted:\n  username: ' + username + '\n  password: ' + password;
      sessionStorage.removeItem('split-login-username');
    });
  </script>
</body>
</html>
