<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Registration - Autofill Test</title>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 480px; margin: 40px auto; padding: 0 16px; }
    h1 { font-size: 1.25rem; }
    nav { margin-bottom: 24px; }
    nav a { color: #2563eb; }
    label { display: block; margin-bottom: 4px; font-weight: 500; }
    input { display: block; width: 100%; padding: 8px; margin-bottom: 16px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
    button { padding: 8px 16px; background: #2563eb; color: #fff; border: none; border-radius: 4px; cursor: pointer; }
    #result { margin-top: 24px; padding: 12px; background: #f3f4f6; border-radius: 4px; white-space: pre-wrap; display: none; }
    .expected { margin: 24px 0; padding: 12px; background: #fefce8; border: 1px solid #fde68a; border-radius: 4px; font-size: 0.9rem; }
    .expected summary { font-weight: 600; cursor: pointer; }
    .expected ul { margin: 8px 0 0; padding-left: 20px; }
    .expected li { margin-bottom: 4px; }
  </style>
</head>
<body>
  <nav><a href="/">&larr; Test Pages Index</a></nav>
  <h1>Registration Form</h1>
  <p>Should be detected as <code>REGISTRATION</code>.</p>

  <details class="expected" open>
    <summary>Expected Behavior</summary>
    <ul>
      <li>Form type: <code>REGISTRATION</code></li>
      <li>Focus username field → dropdown appears with matching entries</li>
      <li>Select entry → username and first new-password field filled</li>
      <li>Confirm password field is <strong>NOT</strong> filled</li>
    </ul>
  </details>

  <form id="reg-form" method="POST" action="#">
    <label for="username">Username</label>
    <input type="text" id="username" name="username" autocomplete="username" placeholder="Choose a username">

    <label for="email">Email</label>
    <input type="email" id="email" name="email" autocomplete="email" placeholder="user@example.com">

    <label for="new-password">Password</label>
    <input type="password" id="new-password" name="new-password" autocomplete="new-password" placeholder="Create a password">

    <label for="confirm-password">Confirm Password</label>
    <input type="password" id="confirm-password" name="confirm-password" autocomplete="new-password" placeholder="Confirm your password">

    <button type="submit">Register</button>
  </form>

  <pre id="result"></pre>

  <script>
    document.getElementById('reg-form').addEventListener('submit', function(e) {
      e.preventDefault();
      const data = {
        username: document.getElementById('username').value,
        email: document.getElementById('email').value,
        password: document.getElementById('new-password').value,
        confirm: document.getElementById('confirm-password').value,
      };
      const result = document.getElementById('result');
      result.style.display = 'block';
      result.textContent = 'Submitted:\n' + Object.entries(data).map(([k, v]) => '  ' + k + ': ' + v).join('\n');
    });
  </script>
</body>
</html>
