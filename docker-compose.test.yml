services:
  minio:
    image: minio/minio
    ports:
      - "9000:9000"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5

  createbuckets:
    image: minio/mc
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set myminio http://minio:9000 minioadmin minioadmin;
      mc mb myminio/kura-test;
      exit 0;
      "

  seedvault:
    image: minio/mc
    depends_on:
      minio:
        condition: service_healthy
    volumes:
      - ./extension/test-pages/fixtures/vault.json:/tmp/vault.json:ro
    entrypoint: >
      /bin/sh -c "
      mc alias set myminio http://minio:9000 minioadmin minioadmin;
      mc cp /tmp/vault.json myminio/kura-test/vault.json;
      exit 0;
      "
